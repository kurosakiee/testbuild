steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Minimum Android Build Files
        run: |
          cd project
          
          # Create settings.gradle
          echo "rootProject.name = 'UmasumeAI'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          # Create root build.gradle
          clobber_build_gradle=$(cat << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF
          )
          echo "$clobber_build_gradle" > build.gradle

          # Create app/build.gradle
          clobber_app_gradle=$(cat << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.umassistent'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.umassistent"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF
          )
          mkdir -p app
          echo "$clobber_app_gradle" > app/build.gradle

      - name: Build with Gradle Action (No local wrapper needed)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          arguments: assembleDebug
          build-root-directory: project